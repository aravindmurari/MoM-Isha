<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miracle of Mind — Session</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; overflow: hidden; font-family: system-ui, sans-serif; }

    #player-video, #player-image {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 1;
      display: none;
    }
    #player-image { object-fit: contain; background: #000; }

    #waiting {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #333;
      z-index: 2;
    }
    #waiting svg { opacity: 0.3; }
    #waiting p { font-size: 0.95rem; color: #444; letter-spacing: 0.03em; }

    #title-overlay {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 6;
      padding: 20px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #title-overlay.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="waiting">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#555" stroke="none"/>
    </svg>
    <p>Waiting for facilitator to select a video…</p>
  </div>

  <video id="player-video" controls autoplay></video>
  <img   id="player-image" alt="" />
  <div   id="title-overlay"></div>

  <script>
    const video   = document.getElementById('player-video');
    const image   = document.getElementById('player-image');
    const waiting = document.getElementById('waiting');
    const overlay = document.getElementById('title-overlay');
    let hideTimer;
    let lastSeenValue = null;
    let currentUrl = null;

    function showWaiting(msg) {
      video.pause(); video.src = ''; video.style.display = 'none';
      image.src = ''; image.style.display = 'none';
      waiting.style.display = 'flex';
      waiting.querySelector('p').textContent = msg || 'Waiting for facilitator to select a video…';
      overlay.classList.remove('visible');
      currentUrl = null;
    }

    function loadMedia(url, title, isImage) {
      if (!url || url === currentUrl) return;
      currentUrl = url;
      waiting.style.display = 'none';

      if (isImage) {
        video.pause(); video.src = ''; video.style.display = 'none';
        image.src = url; image.style.display = 'block';
      } else {
        image.src = ''; image.style.display = 'none';
        video.src = url; video.style.display = 'block';
        video.play().catch(() => {});
      }

      overlay.textContent = title || '';
      overlay.classList.add('visible');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => overlay.classList.remove('visible'), 3500);
    }

    function processStoredValue(raw) {
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        if (data.command === 'stop') {
          showWaiting();
        } else if (data.url) {
          const isImage = data.fileId === 'qr-code';
          loadMedia(data.url, data.title, isImage);
        }
      } catch(e) {}
    }

    // Poll localStorage every 400ms — reliable across file:// windows
    function poll() {
      const current = localStorage.getItem('smCurrentVideo');
      if (current !== lastSeenValue) {
        lastSeenValue = current;
        processStoredValue(current);
      }
    }

    window.addEventListener('storage', (e) => {
      if (e.key === 'smCurrentVideo') {
        lastSeenValue = e.newValue;
        processStoredValue(e.newValue);
      }
    });

    poll();
    setInterval(poll, 400);
  </script>
</body>
</html>
