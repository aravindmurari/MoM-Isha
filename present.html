<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miracle of Mind — Session</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; overflow: hidden; font-family: system-ui, sans-serif; }

    #player-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    /* Blocks Google Drive's top bar / open-in-Drive link */
    #drive-block {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      z-index: 10;
    }

    #waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: #333;
    }
    #waiting svg { opacity: 0.3; }
    #waiting p { font-size: 0.95rem; color: #444; letter-spacing: 0.03em; }

    #title-overlay {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 20px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #title-overlay.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="waiting">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#555" stroke="none"/>
    </svg>
    <p>Waiting for facilitator to select a video…</p>
  </div>

  <iframe id="player-frame" allow="autoplay" allowfullscreen></iframe>
  <div id="drive-block"></div>
  <div id="title-overlay"></div>

  <script>
    const frame   = document.getElementById('player-frame');
    const waiting = document.getElementById('waiting');
    const overlay = document.getElementById('title-overlay');
    let hideTimer;

    function loadVideo(fileId, title) {
      if (!fileId) return;
      frame.src = 'https://drive.google.com/file/d/' + fileId + '/preview';
      frame.style.display = 'block';
      document.getElementById('drive-block').style.display = 'block';
      waiting.style.display = 'none';

      // Flash title overlay briefly
      overlay.textContent = title || '';
      overlay.classList.add('visible');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => overlay.classList.remove('visible'), 3500);
    }

    // On load: restore last selected video (if any)
    const stored = localStorage.getItem('smCurrentVideo');
    if (stored) {
      try {
        const { fileId, title } = JSON.parse(stored);
        loadVideo(fileId, title);
      } catch(e) {}
    }

    // Listen for facilitator selections in the control panel
    window.addEventListener('storage', (e) => {
      if (e.key === 'smCurrentVideo' && e.newValue) {
        try {
          const { fileId, title } = JSON.parse(e.newValue);
          loadVideo(fileId, title);
        } catch(e) {}
      }
    });
  </script>
</body>
</html>
