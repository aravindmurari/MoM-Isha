<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miracle of Mind — Session</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; overflow: hidden; font-family: system-ui, sans-serif; }

    #player-frame {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 1;
      display: none;
    }
    /* Blocks Google Drive's top bar / open-in-Drive link */
    #drive-block {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      z-index: 5;
    }

    #waiting {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #333;
      z-index: 2;
    }
    #waiting svg { opacity: 0.3; }
    #waiting p { font-size: 0.95rem; color: #444; letter-spacing: 0.03em; }

    #title-overlay {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 6;
      padding: 20px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #title-overlay.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="waiting">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#555" stroke="none"/>
    </svg>
    <p>Waiting for facilitator to select a video…</p>
  </div>

  <iframe id="player-frame" allow="autoplay" allowfullscreen></iframe>
  <div id="drive-block"></div>
  <div id="title-overlay"></div>

  <script>
    const frame   = document.getElementById('player-frame');
    const waiting = document.getElementById('waiting');
    const overlay = document.getElementById('title-overlay');
    const driveBlock = document.getElementById('drive-block');
    let hideTimer;
    let lastSeenValue = null;
    let currentFileId  = null;

    function showWaiting(msg) {
      frame.src = '';
      frame.style.display = 'none';
      driveBlock.style.display = 'none';
      waiting.style.display = 'flex';
      waiting.querySelector('p').textContent = msg || 'Waiting for facilitator to select a video…';
      overlay.classList.remove('visible');
      currentFileId = null;
    }

    function loadVideo(fileId, title) {
      if (!fileId || fileId === currentFileId) return;
      currentFileId = fileId;
      frame.src = 'https://drive.google.com/file/d/' + fileId + '/preview?autoplay=1';
      frame.style.display = 'block';
      driveBlock.style.display = 'block';
      waiting.style.display = 'none';
      overlay.textContent = title || '';
      overlay.classList.add('visible');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => overlay.classList.remove('visible'), 3500);
    }

    function processStoredValue(raw) {
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        if (data.command === 'stop') {
          showWaiting();
        } else if (data.fileId) {
          loadVideo(data.fileId, data.title);
        }
      } catch(e) {}
    }

    // Poll localStorage every 400ms — reliable across file:// windows
    function poll() {
      const current = localStorage.getItem('smCurrentVideo');
      if (current !== lastSeenValue) {
        lastSeenValue = current;
        processStoredValue(current);
      }
    }

    // Also keep the storage event as a fast-path for same-origin HTTP contexts
    window.addEventListener('storage', (e) => {
      if (e.key === 'smCurrentVideo') {
        lastSeenValue = e.newValue;
        processStoredValue(e.newValue);
      }
    });

    // Initial check + start polling
    poll();
    setInterval(poll, 400);
  </script>
</body>
</html>
