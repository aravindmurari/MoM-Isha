<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyer Generator — Miracle of Mind Volunteer Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Trirong:ital,wght@0,400;1,400&display=swap">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #EC1C2D;
      --amber: #D4914A;
      --dark: #08080a;
      --cream: #FFF7E9;
      --mid: #6E665B;
      --light: #A09890;
      --border: #E8DECE;
      --bg: #F2EDE4;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── NAV ─────────────────────────────────────────────────── */
    nav {
      background: var(--dark);
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid var(--red);
    }
    nav a.back {
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      opacity: 0.65;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity 0.15s;
    }
    nav a.back:hover { opacity: 1; }
    nav .sep { color: #fff; opacity: 0.25; font-size: 18px; line-height: 1; }
    nav .page-title { color: #fff; font-size: 14px; font-weight: 600; }
    nav .badge {
      background: var(--amber);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    /* ── LAYOUT ──────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: calc(100vh - 48px);
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      max-height: calc(100vh - 48px);
      position: sticky;
      top: 48px;
    }

    .main {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ── SECTION LABEL ───────────────────────────────────────── */
    .slabel {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 10px;
    }

    .sb-section { margin-bottom: 22px; }

    hr.div { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── TEMPLATE GRID ───────────────────────────────────────── */
    .tmpl-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .tmpl-thumb {
      position: relative;
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
      aspect-ratio: 4/5;
      background: #eee;
    }
    .tmpl-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tmpl-thumb .n {
      position: absolute;
      bottom: 3px;
      right: 4px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      line-height: 1;
    }
    .tmpl-thumb:hover { border-color: var(--amber); transform: scale(1.03); }
    .tmpl-thumb.sel { border-color: var(--red); }
    .tmpl-thumb.sel::after {
      content: '✓';
      position: absolute;
      top: 3px; left: 3px;
      width: 15px; height: 15px;
      background: var(--red);
      border-radius: 50%;
      color: #fff;
      font-size: 9px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 15px;
      text-align: center;
    }

    /* ── FORM ────────────────────────────────────────────────── */
    .fg { margin-bottom: 12px; }
    .fg label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 4px;
    }
    .fg input {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--dark);
      background: #FAFAF7;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .fg input:focus { border-color: var(--red); background: #fff; }
    .fg .hint { font-size: 10px; color: var(--light); margin-top: 3px; line-height: 1.4; }

    /* ── DOWNLOAD BUTTON ─────────────────────────────────────── */
    .btn-dl {
      width: 100%;
      padding: 11px 16px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-dl:hover { background: #c41020; }
    .btn-dl:active { background: #a50e1b; }

    .tip-note {
      font-size: 11px;
      color: var(--light);
      line-height: 1.5;
      margin-top: 10px;
    }
    .tip-note a { color: var(--red); }

    /* ── PREVIEW ─────────────────────────────────────────────── */
    .preview-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
    }

    #flyerCanvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 12px 50px rgba(0,0,0,0.22);
      max-width: min(560px, calc(100vw - 380px));
      width: auto;
      height: auto;
    }

    .preview-sub {
      font-size: 12px;
      color: var(--light);
      text-align: center;
      max-width: 460px;
      line-height: 1.5;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 800px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: none; }
      .main { padding: 20px 16px; }
      #flyerCanvas { max-width: min(560px, calc(100vw - 32px)); }
    }
  </style>
</head>
<body>

<nav>
  <a class="back" href="index.html">← Volunteer Hub</a>
  <span class="sep">|</span>
  <span class="page-title">Flyer Generator</span>
  <span class="badge">Volunteer Tool</span>
</nav>

<div class="app">

  <!-- ── SIDEBAR ──────────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="sb-section">
      <div class="slabel">Choose Template</div>
      <div class="tmpl-grid" id="tmplGrid"></div>
    </div>

    <hr class="div">

    <div class="sb-section">
      <div class="slabel">Event Details</div>

      <div class="fg">
        <label>Date</label>
        <input id="fDate" type="text" placeholder="e.g. Saturday, April 12" value="Saturday, April 12">
      </div>
      <div class="fg">
        <label>Time</label>
        <input id="fTime" type="text" placeholder="e.g. 2:00 PM – 2:30 PM" value="2:00 PM – 2:30 PM">
      </div>
      <div class="fg">
        <label>Address Line 1</label>
        <input id="fAddr1" type="text" placeholder="e.g. 123 Main Street" value="123 Main Street">
      </div>
      <div class="fg">
        <label>City / State / Zip</label>
        <input id="fAddr2" type="text" placeholder="e.g. Toronto, ON M5V 3A8" value="Toronto, ON M5V 3A8">
      </div>
    </div>

    <button class="btn-dl" onclick="downloadFlyer()">
      ↓&nbsp; Download Flyer (PNG)
    </button>

    <p class="tip-note">
      Best used on <a href="https://aravindmurari.github.io/MoM-Isha/flyer.html" target="_blank">GitHub Pages</a>.
      Opening as a local file may block image loading in some browsers.
    </p>

  </aside>

  <!-- ── MAIN PREVIEW ─────────────────────────────────────── -->
  <main class="main">
    <div class="preview-label">Live Preview</div>
    <canvas id="flyerCanvas" width="560" height="700"></canvas>
    <p class="preview-sub">
      Updates as you type. Download saves a high-resolution 2× PNG.
    </p>
  </main>

</div>

<script>
// ════════════════════════════════════════════════════════
//  NOTE: Templates should be exported from Canva WITHOUT
//  the placeholder date/time/address text fields.
//  The RSVP QR code and "FREE & OPEN TO ALL" stay baked in.
//  This generator only overlays event details text.
//
//  Canvas: 560 × 700 (4:5 — matches template 1080 × 1350)
//  Download: 2× = 1120 × 1400
// ════════════════════════════════════════════════════════
const W = 560, H = 700;

// ════════════════════════════════════════════════════════
//  TEXT OVERLAY CONFIGS  (canvas 560 × 700)
//
//  Font: Trirong 400 (regular) — matches Canva template font.
//  Canva size 20.7 on 1080×1350 template → 10.7px at preview
//  scale (560/1080), → 21.4px at 2× download (1120×1400 ≈ orig).
//
//  Coordinates measured from original template PNGs via pixel
//  scan. textY is the TOP of the first line (textBaseline='top').
//  lineH is the vertical step between lines.
//
//  Positions survive when blank templates replace these PNGs
//  (text field area cleared; footer bar / body unchanged).
//
//  color  — text fill color (white on dark, dark on light bg)
//  align  — 'left' or 'center'
//  x      — textX (left edge for 'left', center for 'center')
//  y      — top of first text line
//  lh     — line height (px)
// ════════════════════════════════════════════════════════
// FS = Canva font size 20.7 scaled to preview canvas:
//   20.7 × (560/1080) = 10.72px
// At 2× download (1120×1400) → 21.4px ≈ original 20.7  ✓
const FS = 10.7;

// Coordinates derived by diffing original vs blank templates:
// x/y = canvas pixel of top-left of first character (textBaseline='top').
// lh  = line height in canvas px = (span - FS) / 3  (3 gaps between 4 lines).
const CFGS = {
  // ── Footer-bar templates (red bar, left-aligned white text) ──
  // diff: x_orig 25–291 → canvas 13–151 | y varies slightly per template
  2:  { color:'#FFFFFF', align:'left',   x:13, y:628, lh:16 },
  4:  { color:'#FFFFFF', align:'left',   x:13, y:628, lh:16 },
  7:  { color:'#FFFFFF', align:'left',   x:13, y:628, lh:16 },
  9:  { color:'#FFFFFF', align:'left',   x:13, y:628, lh:16 },
  10: { color:'#FFFFFF', align:'left',   x:13, y:628, lh:16 },
  12: { color:'#FFFFFF', align:'left',   x:13, y:628, lh:16 },
  3:  { color:'#FFFFFF', align:'left',   x:13, y:625, lh:16 },  // 3px higher
  6:  { color:'#FFFFFF', align:'left',   x:13, y:613, lh:16 },  // footer higher

  // T1: 4-photo grid — text in body center, not footer bar
  // diff: canvas y=544–629 (85px), cx=279, white text on dark photos
  1:  { color:'#FFFFFF', align:'center', x:279, y:544, lh:25 },

  // T5: Sadhguru portrait + phone — text upper-right area
  // diff: canvas y=531–608 (77px), cx=427, white text on dark bg
  5:  { color:'#FFFFFF', align:'center', x:427, y:531, lh:22 },

  // T8: Split panel — text in upper-right black panel
  // diff: canvas y=477–566 (89px), cx=415, white text on black
  8:  { color:'#FFFFFF', align:'center', x:415, y:477, lh:26 },

  // T11: Silhouette — text mid-right, light background → dark text
  // diff: canvas y=352–444 (92px), cx=409
  11: { color:'#1A1A1A', align:'center', x:409, y:352, lh:27 },
};

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let selectedId = 1;
const previewCanvas = document.getElementById('flyerCanvas');
const previewCtx = previewCanvas.getContext('2d');
const imgCache = {};
let renderPending = false;

// ════════════════════════════════════════════════════════
//  BUILD TEMPLATE PICKER
// ════════════════════════════════════════════════════════
const grid = document.getElementById('tmplGrid');
for (let i = 1; i <= 12; i++) {
  const d = document.createElement('div');
  d.className = 'tmpl-thumb' + (i === 1 ? ' sel' : '');
  d.dataset.id = i;
  d.innerHTML = `<img src="files/templates/${i}.png" alt="Template ${i}" loading="lazy"><span class="n">${i}</span>`;
  d.onclick = () => {
    selectedId = i;
    document.querySelectorAll('.tmpl-thumb').forEach(el =>
      el.classList.toggle('sel', +el.dataset.id === i));
    scheduleRender();
  };
  grid.appendChild(d);
}

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function loadImage(src) {
  return new Promise((resolve, reject) => {
    if (imgCache[src]) { resolve(imgCache[src]); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => { imgCache[src] = img; resolve(img); };
    img.onerror = reject;
    img.src = src;
  });
}

function getFields() {
  return {
    date:  document.getElementById('fDate').value.trim(),
    time:  document.getElementById('fTime').value.trim(),
    addr1: document.getElementById('fAddr1').value.trim(),
    addr2: document.getElementById('fAddr2').value.trim(),
  };
}

// ════════════════════════════════════════════════════════
//  CORE RENDERER
// ════════════════════════════════════════════════════════
async function renderOnCtx(ctx, scale) {
  const sw = W * scale, sh = H * scale;
  const fields = getFields();
  const cfg = CFGS[selectedId] || CFGS[1];

  ctx.clearRect(0, 0, sw, sh);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, sw, sh);

  // Draw template image
  let img;
  try {
    img = await loadImage(`files/templates/${selectedId}.png`);
  } catch (_) {
    ctx.fillStyle = '#333'; ctx.fillRect(0, 0, sw, sh);
    ctx.fillStyle = '#999';
    ctx.font = `${14 * scale}px Inter, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Image could not load.', sw / 2, sh / 2 - 10 * scale);
    ctx.fillText('Use GitHub Pages for full functionality.', sw / 2, sh / 2 + 12 * scale);
    return;
  }
  ctx.drawImage(img, 0, 0, sw, sh);

  // Overlay event detail lines
  const sz = FS * scale;
  ctx.font = `400 ${sz}px "Trirong", serif`;
  ctx.fillStyle = cfg.color;
  ctx.textAlign = cfg.align;
  ctx.textBaseline = 'top';  // y = top of character, matches pixel measurements

  const lines = [fields.date, fields.addr1, fields.addr2, fields.time].filter(Boolean);
  let y = cfg.y * scale;
  for (const ln of lines) {
    ctx.fillText(ln, cfg.x * scale, y);
    y += cfg.lh * scale;
  }
  ctx.textBaseline = 'alphabetic';  // reset
}

// ════════════════════════════════════════════════════════
//  SCHEDULE PREVIEW (debounced)
// ════════════════════════════════════════════════════════
function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(async () => {
    await document.fonts.ready;
    await renderOnCtx(previewCtx, 1);
    renderPending = false;
  });
}

// ════════════════════════════════════════════════════════
//  DOWNLOAD (2× hi-res)
// ════════════════════════════════════════════════════════
async function downloadFlyer() {
  const btn = document.querySelector('.btn-dl');
  btn.disabled = true;
  btn.textContent = 'Generating…';
  try {
    await document.fonts.ready;
    const hc = document.createElement('canvas');
    hc.width = W * 2; hc.height = H * 2;
    await renderOnCtx(hc.getContext('2d'), 2);
    const a = document.createElement('a');
    a.download = `MoM_Flyer_${selectedId}.png`;
    a.href = hc.toDataURL('image/png');
    a.click();
  } catch (e) {
    alert('Download failed. Make sure you are using the GitHub Pages version of this site.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '↓&nbsp; Download Flyer (PNG)';
  }
}

// ════════════════════════════════════════════════════════
//  LIVE INPUTS
// ════════════════════════════════════════════════════════
['fDate','fTime','fAddr1','fAddr2'].forEach(id =>
  document.getElementById(id).addEventListener('input', scheduleRender));

document.fonts.ready.then(() => scheduleRender());
</script>

</body>
</html>
