<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyer Generator — Miracle of Mind Volunteer Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&family=Trirong:ital,wght@1,700&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #EC1C2D;
      --amber: #D4914A;
      --dark: #08080a;
      --cream: #FFF7E9;
      --mid: #6E665B;
      --light: #A09890;
      --border: #E8DECE;
      --bg: #F2EDE4;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── NAV ─────────────────────────────────────────────────── */
    nav {
      background: var(--dark);
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid var(--red);
    }
    nav a.back {
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      opacity: 0.65;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity 0.15s;
    }
    nav a.back:hover { opacity: 1; }
    nav .sep { color: #fff; opacity: 0.25; font-size: 18px; line-height: 1; }
    nav .page-title { color: #fff; font-size: 14px; font-weight: 600; }
    nav .badge {
      background: var(--amber);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    /* ── LAYOUT ──────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: calc(100vh - 48px);
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      max-height: calc(100vh - 48px);
      position: sticky;
      top: 48px;
    }

    .main {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ── SECTION LABEL ───────────────────────────────────────── */
    .slabel {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 10px;
    }

    .sb-section { margin-bottom: 22px; }

    hr.div { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── TEMPLATE GRID ───────────────────────────────────────── */
    .tmpl-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .tmpl-thumb {
      position: relative;
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
      aspect-ratio: 4/5;
      background: #eee;
    }
    .tmpl-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tmpl-thumb .n {
      position: absolute;
      bottom: 3px;
      right: 4px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      line-height: 1;
    }
    .tmpl-thumb:hover { border-color: var(--amber); transform: scale(1.03); }
    .tmpl-thumb.sel { border-color: var(--red); }
    .tmpl-thumb.sel::after {
      content: '✓';
      position: absolute;
      top: 3px; left: 3px;
      width: 15px; height: 15px;
      background: var(--red);
      border-radius: 50%;
      color: #fff;
      font-size: 9px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 15px;
      text-align: center;
    }

    /* ── FORM ────────────────────────────────────────────────── */
    .fg { margin-bottom: 12px; }
    .fg label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 4px;
    }
    .fg input {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--dark);
      background: #FAFAF7;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .fg input:focus { border-color: var(--red); background: #fff; }
    .fg .hint { font-size: 10px; color: var(--light); margin-top: 3px; line-height: 1.4; }

    /* ── DOWNLOAD BUTTON ─────────────────────────────────────── */
    .btn-dl {
      width: 100%;
      padding: 11px 16px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-dl:hover { background: #c41020; }
    .btn-dl:active { background: #a50e1b; }

    .tip-note {
      font-size: 11px;
      color: var(--light);
      line-height: 1.5;
      margin-top: 10px;
    }
    .tip-note a { color: var(--red); }

    /* ── PREVIEW ─────────────────────────────────────────────── */
    .preview-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
    }

    #flyerCanvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 12px 50px rgba(0,0,0,0.22);
      max-width: min(560px, calc(100vw - 380px));
      width: auto;
      height: auto;
    }

    .preview-sub {
      font-size: 12px;
      color: var(--light);
      text-align: center;
      max-width: 460px;
      line-height: 1.5;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 800px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: none; }
      .main { padding: 20px 16px; }
      #flyerCanvas { max-width: min(560px, calc(100vw - 32px)); }
    }
  </style>
</head>
<body>

<nav>
  <a class="back" href="index.html">← Volunteer Hub</a>
  <span class="sep">|</span>
  <span class="page-title">Flyer Generator</span>
  <span class="badge">Volunteer Tool</span>
</nav>

<div class="app">

  <!-- ── SIDEBAR ──────────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="sb-section">
      <div class="slabel">Choose Template</div>
      <div class="tmpl-grid" id="tmplGrid"></div>
    </div>

    <hr class="div">

    <div class="sb-section">
      <div class="slabel">Event Details</div>

      <div class="fg">
        <label>Date</label>
        <input id="fDate" type="text" placeholder="e.g. Saturday, April 12" value="Saturday, April 12">
      </div>
      <div class="fg">
        <label>Time</label>
        <input id="fTime" type="text" placeholder="e.g. 2:00 PM – 2:30 PM" value="2:00 PM – 2:30 PM">
      </div>
      <div class="fg">
        <label>Address Line 1</label>
        <input id="fAddr1" type="text" placeholder="e.g. 123 Main Street" value="123 Main Street">
      </div>
      <div class="fg">
        <label>City / State / Zip</label>
        <input id="fAddr2" type="text" placeholder="e.g. Toronto, ON M5V 3A8" value="Toronto, ON M5V 3A8">
      </div>
      <div class="fg">
        <label>RSVP / Registration Link</label>
        <input id="fUrl" type="url" placeholder="https://isha.co/mom" value="https://isha.co/mom">
        <div class="hint">QR code is auto-generated from this link.</div>
      </div>
    </div>

    <button class="btn-dl" onclick="downloadFlyer()">
      ↓&nbsp; Download Flyer (PNG)
    </button>

    <p class="tip-note">
      Best used on <a href="https://aravindmurari.github.io/MoM-Isha/flyer.html" target="_blank">GitHub Pages</a>.
      Opening as a local file may block image loading in some browsers.
    </p>

  </aside>

  <!-- ── MAIN PREVIEW ─────────────────────────────────────── -->
  <main class="main">
    <div class="preview-label">Live Preview</div>
    <canvas id="flyerCanvas" width="560" height="700"></canvas>
    <p class="preview-sub">
      Updates as you type. Download saves a high-resolution 2× PNG.
    </p>
  </main>

</div>

<script>
// ════════════════════════════════════════════════════════
//  CONSTANTS
//  Canvas preview is always 560 × 700 (4:5, matches all
//  templates which are 1080 × 1350 — same ratio).
//  Download is 2× = 1120 × 1400.
// ════════════════════════════════════════════════════════
const W = 560, H = 700;

// ════════════════════════════════════════════════════════
//  FOOTER-REPAINT CONFIGS
//  Used for templates whose footer bar we fully repaint.
//  All coordinates are at scale=1 (preview size).
//  They are multiplied by `scale` at draw time.
//
//  Measured from template 7 (1080×1350 → 560×700):
//    footer starts at y=1172 in original → 608 in canvas
//    footer color sampled: rgb(239,30,30) = #EF1E1E
//    QR location (from pixel scan): original x=319–461
//      → canvas x=165–239, center=202, size=74
//    Sections: [details 0–161] | [QR 161–280] | [FREE 280–560]
// ════════════════════════════════════════════════════════
const FOOTER_REPAINT = {
  // ── Template 7: Sadhguru portrait, red footer ─────────
  7: {
    footerY:    608,        // canvas y where footer bar starts
    footerH:    92,         // canvas footer height (700-608)
    color:      '#EF1E1E',  // sampled footer red

    // Event details (left section)
    detailsX:   15,         // left-align x
    detailsY:   620,        // y of first line
    detailsLH:  20,         // line height px
    detailsFont:'700 12px "Montserrat",sans-serif',

    // Dividers (thin vertical lines)
    div1X:      161,
    div2X:      280,

    // QR (center section, right of RSVP label)
    // From pixel scan: original x 319-461 → canvas 165-239
    qrX:        167,        // canvas left edge of QR
    qrSize:     72,         // canvas px
    // RSVP label sits to the right of QR, before div2
    rsvpX:      248,        // left edge of "RSVP / HERE:" text
    rsvpY1:     647,        // y of "RSVP"
    rsvpY2:     661,        // y of "HERE:"
    rsvpFont:   '800 11px "Montserrat",sans-serif',

    // "FREE & OPEN TO ALL" (right section)
    freeX:      420,        // center x: (280+560)/2
    freeY:      657,        // vertically centered in footer
    freeFont:   '900 13px "Montserrat",sans-serif',
    freeLetterSpacing: 1,   // px
  }
};

// ════════════════════════════════════════════════════════
//  GENERIC OVERLAY CONFIGS (for templates without repaint)
//  Fractions of canvas size.
// ════════════════════════════════════════════════════════
const OVERLAY_DEFAULT = {
  textColor: '#FFFFFF', textX: 0.038, textY: 0.863,
  lineH: 0.030, fontSize: 13, fontWeight: 'bold', textAlign: 'left',
  shadow: true, qrCX: 0.505, qrCY: 0.905, qrSize: 78, qrBg: true
};

const OVERLAY_CFGS = {
  1:  { ...OVERLAY_DEFAULT },
  2:  { ...OVERLAY_DEFAULT },
  3:  { ...OVERLAY_DEFAULT },
  4:  { ...OVERLAY_DEFAULT },
  6:  { ...OVERLAY_DEFAULT },
  9:  { ...OVERLAY_DEFAULT },
  10: { ...OVERLAY_DEFAULT },
  12: { ...OVERLAY_DEFAULT },
  5: {
    textColor: '#1A1A1A', textX: 0.5, textY: 0.725, lineH: 0.040,
    fontSize: 13, fontWeight: 'bold', textAlign: 'center', shadow: false,
    qrCX: 0.765, qrCY: 0.875, qrSize: 68, qrBg: true
  },
  8: {
    textColor: '#FFFFFF', textX: 0.5, textY: 0.730, lineH: 0.038,
    fontSize: 13, fontWeight: 'bold', textAlign: 'center', shadow: false,
    qrCX: 0.595, qrCY: 0.885, qrSize: 68, qrBg: false
  },
  11: {
    textColor: '#1A1A1A', textX: 0.540, textY: 0.598, lineH: 0.038,
    fontSize: 13, fontWeight: 'bold', textAlign: 'center', shadow: false,
    qrCX: 0.574, qrCY: 0.780, qrSize: 68, qrBg: false
  }
};

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let selectedId = 7;   // start on template 7 (the tested one)
const previewCanvas = document.getElementById('flyerCanvas');
const previewCtx = previewCanvas.getContext('2d');
const imgCache = {};
let renderPending = false;

// ════════════════════════════════════════════════════════
//  BUILD TEMPLATE PICKER
// ════════════════════════════════════════════════════════
const grid = document.getElementById('tmplGrid');
for (let i = 1; i <= 12; i++) {
  const d = document.createElement('div');
  d.className = 'tmpl-thumb' + (i === selectedId ? ' sel' : '');
  d.dataset.id = i;
  // Badge: show (B) for repaint-ready templates
  const badge = FOOTER_REPAINT[i]
    ? `<span class="n" style="background:rgba(0,150,80,0.7);border-radius:3px;padding:1px 3px;">${i}</span>`
    : `<span class="n">${i}</span>`;
  d.innerHTML = `<img src="files/templates/${i}.png" alt="Template ${i}" loading="lazy">${badge}`;
  d.onclick = () => {
    selectedId = i;
    document.querySelectorAll('.tmpl-thumb').forEach(el =>
      el.classList.toggle('sel', +el.dataset.id === i));
    scheduleRender();
  };
  grid.appendChild(d);
}

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function loadImage(src) {
  return new Promise((resolve, reject) => {
    if (imgCache[src]) { resolve(imgCache[src]); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => { imgCache[src] = img; resolve(img); };
    img.onerror = reject;
    img.src = src;
  });
}

function makeQR(url, size) {
  return new Promise((resolve, reject) => {
    const qc = document.createElement('canvas');
    qc.width = size; qc.height = size;
    QRCode.toCanvas(qc, url || 'https://isha.co/mom', {
      width: size, margin: 1,
      color: { dark: '#000000', light: '#FFFFFF' }
    }, err => err ? reject(err) : resolve(qc));
  });
}

function getFields() {
  return {
    date:  document.getElementById('fDate').value.trim(),
    time:  document.getElementById('fTime').value.trim(),
    addr1: document.getElementById('fAddr1').value.trim(),
    addr2: document.getElementById('fAddr2').value.trim(),
    url:   document.getElementById('fUrl').value.trim() || 'https://isha.co/mom'
  };
}

// ════════════════════════════════════════════════════════
//  FOOTER REPAINT  (Option B)
//  Covers the entire footer bar with a solid fill, then
//  redraws all three sections from scratch.
// ════════════════════════════════════════════════════════
async function drawRepaintedFooter(ctx, s, cfg, fields) {
  // s = scale (1 for preview, 2 for download)

  const fy    = cfg.footerY * s;
  const fh    = cfg.footerH * s;
  const fw    = W * s;

  // ── 1. Flood-fill footer bar ─────────────────────────
  ctx.fillStyle = cfg.color;
  ctx.fillRect(0, fy, fw, fh);

  // ── 2. Thin vertical dividers ───────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = s;
  const divTop = fy + 10 * s, divBot = fy + fh - 10 * s;
  for (const dx of [cfg.div1X, cfg.div2X]) {
    ctx.beginPath();
    ctx.moveTo(dx * s, divTop);
    ctx.lineTo(dx * s, divBot);
    ctx.stroke();
  }

  // ── 3. Event details (left section) ─────────────────
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'left';
  ctx.font = cfg.detailsFont.replace(/(\d+)px/, m => `${parseInt(m) * s}px`);

  const lines = [fields.date, fields.addr1, fields.addr2, fields.time].filter(Boolean);
  // Vertically center the text block within the footer
  const blockH  = lines.length * cfg.detailsLH * s;
  let   lineY   = fy + (fh - blockH) / 2 + cfg.detailsLH * s * 0.78;
  for (const ln of lines) {
    ctx.fillText(ln, cfg.detailsX * s, lineY);
    lineY += cfg.detailsLH * s;
  }

  // ── 4. QR code ───────────────────────────────────────
  const qrSz = cfg.qrSize * s;
  const qrTop = fy + (fh - qrSz) / 2;
  try {
    const qrCanvas = await makeQR(fields.url, qrSz);
    ctx.drawImage(qrCanvas, cfg.qrX * s, qrTop, qrSz, qrSz);
  } catch (e) {
    // If QR fails, draw a placeholder square
    ctx.fillStyle = '#fff';
    ctx.fillRect(cfg.qrX * s, qrTop, qrSz, qrSz);
    ctx.fillStyle = cfg.color;
    ctx.font = `${8 * s}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('QR', (cfg.qrX + cfg.qrSize / 2) * s, fy + fh / 2 + 3 * s);
  }

  // ── 5. "RSVP / HERE:" label ──────────────────────────
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'left';
  ctx.font = cfg.rsvpFont.replace(/(\d+)px/, m => `${parseInt(m) * s}px`);
  ctx.fillText('RSVP',  cfg.rsvpX * s, cfg.rsvpY1 * s);
  ctx.fillText('HERE:', cfg.rsvpX * s, cfg.rsvpY2 * s);

  // ── 6. "FREE & OPEN TO ALL" ──────────────────────────
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.font = cfg.freeFont.replace(/(\d+)px/, m => `${parseInt(m) * s}px`);
  // Manual letter-spacing via character-by-character draw
  const freeText = 'FREE & OPEN TO ALL';
  const ls = (cfg.freeLetterSpacing || 0) * s;
  if (ls > 0) {
    // measure total width with spacing
    const cw = freeText.split('').map(c => ctx.measureText(c).width);
    const total = cw.reduce((a,b) => a+b, 0) + ls * (freeText.length - 1);
    let cx = cfg.freeX * s - total / 2;
    for (let i = 0; i < freeText.length; i++) {
      ctx.textAlign = 'left';
      ctx.fillText(freeText[i], cx, cfg.freeY * s);
      cx += cw[i] + ls;
    }
  } else {
    ctx.textAlign = 'center';
    ctx.fillText(freeText, cfg.freeX * s, cfg.freeY * s);
  }
}

// ════════════════════════════════════════════════════════
//  GENERIC OVERLAY  (for templates without repaint config)
// ════════════════════════════════════════════════════════
async function drawGenericOverlay(ctx, s, cfg, fields) {
  const sw = W * s, sh = H * s;
  ctx.fillStyle = cfg.textColor;
  ctx.textAlign = cfg.textAlign || 'left';
  ctx.font = `${cfg.fontWeight} ${cfg.fontSize * s}px Inter,sans-serif`;

  if (cfg.shadow) {
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 4 * s;
    ctx.shadowOffsetY = s;
  }

  const lines = [fields.date, fields.addr1, fields.addr2, fields.time].filter(Boolean);
  let y = cfg.textY * sh;
  for (const ln of lines) {
    ctx.fillText(ln, cfg.textX * sw, y);
    y += cfg.lineH * sh;
  }
  ctx.shadowBlur = ctx.shadowOffsetY = 0;

  if (fields.url) {
    try {
      const qrSz = cfg.qrSize * s;
      const qc = await makeQR(fields.url, qrSz);
      const qx = cfg.qrCX * sw - qrSz / 2;
      const qy = cfg.qrCY * sh - qrSz / 2;
      if (cfg.qrBg) {
        const p = 3 * s;
        ctx.fillStyle = '#FFF';
        ctx.fillRect(qx - p, qy - p, qrSz + p*2, qrSz + p*2);
      }
      ctx.drawImage(qc, qx, qy, qrSz, qrSz);
    } catch(e) { console.warn('QR failed', e); }
  }
}

// ════════════════════════════════════════════════════════
//  CORE RENDERER
// ════════════════════════════════════════════════════════
async function renderOnCtx(ctx, scale) {
  const sw = W * scale, sh = H * scale;
  const fields = getFields();

  ctx.clearRect(0, 0, sw, sh);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, sw, sh);

  // Load + draw the template image
  let img;
  try {
    img = await loadImage(`files/templates/${selectedId}.png`);
  } catch (_) {
    ctx.fillStyle = '#333'; ctx.fillRect(0, 0, sw, sh);
    ctx.fillStyle = '#999';
    ctx.font = `${14 * scale}px Inter,sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Image could not load.', sw/2, sh/2 - 10*scale);
    ctx.fillText('Use GitHub Pages for full functionality.', sw/2, sh/2 + 12*scale);
    return;
  }
  ctx.drawImage(img, 0, 0, sw, sh);

  // Route to repaint path or generic overlay
  const repaintCfg = FOOTER_REPAINT[selectedId];
  if (repaintCfg) {
    await drawRepaintedFooter(ctx, scale, repaintCfg, fields);
  } else {
    const overlayCfg = OVERLAY_CFGS[selectedId] || OVERLAY_DEFAULT;
    await drawGenericOverlay(ctx, scale, overlayCfg, fields);
  }
}

// ════════════════════════════════════════════════════════
//  SCHEDULE PREVIEW (debounced via rAF)
// ════════════════════════════════════════════════════════
function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(async () => {
    await document.fonts.ready;   // ensure Montserrat is loaded
    await renderOnCtx(previewCtx, 1);
    renderPending = false;
  });
}

// ════════════════════════════════════════════════════════
//  DOWNLOAD (2× hi-res)
// ════════════════════════════════════════════════════════
async function downloadFlyer() {
  const btn = document.querySelector('.btn-dl');
  btn.disabled = true;
  btn.textContent = 'Generating…';
  try {
    await document.fonts.ready;
    const hc = document.createElement('canvas');
    hc.width = W * 2; hc.height = H * 2;
    await renderOnCtx(hc.getContext('2d'), 2);
    const a = document.createElement('a');
    a.download = `MoM_Flyer_${selectedId}.png`;
    a.href = hc.toDataURL('image/png');
    a.click();
  } catch(e) {
    alert('Download failed. Make sure you are using the GitHub Pages version of this site.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '↓&nbsp; Download Flyer (PNG)';
  }
}

// ════════════════════════════════════════════════════════
//  LIVE INPUTS
// ════════════════════════════════════════════════════════
['fDate','fTime','fAddr1','fAddr2','fUrl'].forEach(id =>
  document.getElementById(id).addEventListener('input', scheduleRender));

// ── Init (wait for fonts before first render) ─────────
document.fonts.ready.then(() => scheduleRender());
</script>
